{% extends 'products/base/base.html' %}

{% block page_content%}

<header>
   <h1>Add new product</h1>
</header>
<main>
   <section>
      <form action="{% url 'index' %}" method="post">
         {% csrf_token %}
         <ul>
            {{ form.as_ul }}
         </ul>
         <button type="submit">Add</button>
      </form>
   </section>
   <button><a href="{% url 'products' %}">View products</a></button>
</main>

{% endblock %}
